# xiaoai 自定义后端：说「爸爸最帅」唤醒，用 audio 下音频响应
# 小米音响 / Open-XiaoAI 客户端连接本机 4399
services:
  xiaoai:
    build: .
    container_name: xiaoai
    ports:
      - "4399:4399"
    volumes:
      # 宿主机 audio 覆盖容器内 xiaoai/audio
      - ./audio:/app/xiaoai/audio:ro
      # 可选：若有 config.yaml
      # - ./config.yaml:/app/xiaoai/config.yaml:ro
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
